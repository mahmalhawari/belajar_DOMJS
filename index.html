<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Latihan DOM</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css" integrity="sha384-B0vP5xmATw1+K9KRQjQERJvTumQW0nPEzvF6L/Z6nronJ3oUOFUFpCjEUQouq2+l" crossorigin="anonymous">
    <script defer src="https://use.fontawesome.com/releases/v5.8.1/js/all.js" 
    integrity="sha384-g5uSoOSBd7KkhAMlnQILrecXvzst9TdC09/VM+pjDTCM+1il8RHz5fKANTFFb+gQ" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
    <a class="navbar-brand" href="#">Mini Ecommerce</a>
    <div class="d-flex w-100 w-lg-auto justify-content-between">
        <form class="form-inline my-2 my-lg-0" id="formItem" style="flex-flow: row; display: flex;">
            <input class="form-control mr-2" type="search" placeholder="Search" id="keyword" style="width: 150px;">
            <button class="btn btn-outline-success" type="submit" id="searchItem">Search</button>
        </form>
        <button class="btn btn-primary ml-2" id="cart">
            <i class="fas fa-shopping-cart"></i>(0)
        </button>
    </div>
</nav>
        <div class="row">
            <div class="row col-md-12 mt-2"  id="listBarang" >
                
            </div>
        </div>
    </div>
     <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-Piv4xVNRyMGpqkS2by6br4gNJ7DXjqk09RmUpJ8jgGtD7zP9yug3goQfGII0yAns" crossorigin="anonymous"></script>
    <script>
    // 1. Data yang kamu berikan
    var items = [
        ['001', 'Keyboard Logitek', 60000, 'Keyboard yang mantap untuk kantoran', 'logitek.jpg'], 
        ['002', 'Keyboard MSI', 300000, 'Keyboard gaming MSI mekanik', 'msi.jpg'],
        ['003', 'Mouse Genius', 50000, 'Mouse Genius biar lebih pinter', 'genius.jpg'],
        ['004', 'Mouse Jerry', 30000, 'Mouse yang disukai kucing', 'jerry.jpg']
    ];

    // Target elemen tempat menampung list barang
    var listBarang = document.getElementById("listBarang");

    // --- RELEASE 0: Menampilkan Barang ---
    function printItems(array) {
        var cardHasil = "";
        
        // Looping untuk membuat Card sesuai data
        for (var i = 0; i < array.length; i++) {
            cardHasil += `
<div class="col-12 col-sm-4 mt-2"> 
    <div class="card shadow-sm">
        <img src="jpg/${array[i][4]}" class="card-img-top" height="200px" style="object-fit: cover;">
                    <div class="card-body">
                        <h5 class="card-title" id="itemName">${array[i][1]}</h5>
                        <p class="card-text" id="itemDesc">${array[i][3]}</p>
                        <p class="card-text">Rp ${array[i][2]}</p>
                        <a href="#" class="btn btn-primary" id="addCart" onclick="tambahCart()">Tambahkan ke keranjang</a>
                    </div>
                </div>
            </div>`;
        }
        // Masukkan semua card yang sudah jadi ke dalam div id="listBarang"
        listBarang.innerHTML = cardHasil;
    }

    // Jalankan fungsi tampilkan barang saat pertama kali halaman dibuka
    printItems(items);


    // --- RELEASE 1: Fitur Pencarian ---
    var formItem = document.getElementById("formItem");
    
    formItem.addEventListener("submit", function (event) {
        event.preventDefault(); // Supaya halaman tidak refresh saat klik search
        
        var inputSearch = document.getElementById("keyword").value.toLowerCase();
        
        // Filter data berdasarkan nama (indeks ke-1)
        var filteredItems = items.filter(function (item) {
            return item[1].toLowerCase().includes(inputSearch);
        });

        // Tampilkan hanya item yang difilter
        printItems(filteredItems);
    });


    // --- RELEASE 2: Keranjang ---
    var count = 0;
    var cartBtn = document.getElementById("cart");

    function tambahCart() {
        count++;
        cartBtn.innerHTML = `<i class="fas fa-shopping-cart"></i>(${count})`;
    }
</script>
</body>
</html>
